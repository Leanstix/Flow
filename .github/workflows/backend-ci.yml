name: Backend CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flow
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      FRONTEND_URL: http://localhost:3000
      EMAIL_HOST_USER: noreply@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: flow/requirement.txt

      - name: Install dependencies
        run: pip install -r requirement.txt

      - name: Validate Django configuration
        run: python manage.py check 2>&1 | tee django-check.log

      - name: Verify migrations are committed
        run: python manage.py makemigrations --check --dry-run 2>&1 | tee migration-check.log

      - name: Run backend tests
        run: python manage.py test userauth login profiles posts messaging notifications calls 2>&1 | tee test.log

      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-logs
          path: |
            flow/django-check.log
            flow/migration-check.log
            flow/test.log
          if-no-files-found: ignore
          retention-days: 3
